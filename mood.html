<!DOCTYPE html>
<html>
<head>
  <title>Mood Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 18px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    h2 {
      margin-bottom: 20px;
    }

    input, textarea, select {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    input[type=range] {
      padding: 0;
    }

    button {
      margin-top: 20px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      background: black;
      color: white;
    }

    .secondary {
      background: #ddd;
      color: black;
    }

    .progress {
      height: 6px;
      background: #ddd;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .bar {
      height: 6px;
      background: black;
      border-radius: 10px;
      width: 0%;
    }

    .mic {
      font-size: 20px;
      cursor: pointer;
      margin-left: 8px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="progress"><div class="bar" id="bar"></div></div>

  <h2 id="question"></h2>
  <div id="inputArea"></div>

  <button onclick="next()">Next</button>
</div>

<br>
<button class="secondary" onclick="downloadCSV()">Download CSV</button>
<button class="secondary" onclick="toggleEntries()">View Entries</button>
<div id="entries"></div>

<script>
const steps = [
  { key: "energy", label: "How much energy?", type: "slider" },
  { key: "moody", label: "How moody?", type: "slider" },
  { key: "hopeful", label: "How hopeful?", type: "slider" },
  { key: "diet", label: "Diet yesterday", type: "select", options: ["bad","okay","great"] },
  { key: "exercise", label: "Exercise yesterday", type: "select", options: ["none","walking","real exercise"] },
  { key: "ideas", label: "Big ideas / plans", type: "text" },
  { key: "job", label: "Job outlook", type: "text" },
  { key: "other", label: "Anything else", type: "text" }
];

let current = 0;
let answers = {};

function render() {
  const step = steps[current];
  document.getElementById("question").innerText = step.label;

  const progress = ((current) / steps.length) * 100;
  document.getElementById("bar").style.width = progress + "%";

  let html = "";

  if (step.type === "slider") {
    html = `<input type="range" min="0" max="10" value="5" id="input">`;
  }

  if (step.type === "select") {
    html = `<select id="input">` +
      step.options.map(o => `<option>${o}</option>`).join("") +
      `</select>`;
  }

  if (step.type === "text") {
    html = `
      <textarea id="input"></textarea>
      <div class="mic" onclick="voice()">🎤</div>
    `;
  }

  document.getElementById("inputArea").innerHTML = html;
}

function next() {
  const val = document.getElementById("input").value;
  answers[steps[current].key] = val;

  current++;

  if (current >= steps.length) {
    save();
    current = 0;
    answers = {};
    alert("Saved ✓");
  }

  render();
}

function save() {
  answers.timestamp = new Date().toLocaleString();

  let entries = JSON.parse(localStorage.getItem("entries")) || [];
  entries.push(answers);
  localStorage.setItem("entries", JSON.stringify(entries));
}

function downloadCSV() {
  const entries = JSON.parse(localStorage.getItem("entries")) || [];
  if (!entries.length) return alert("No data");

  let csv = Object.keys(entries[0]).join(",") + "\n";

  entries.forEach(e => {
    csv += Object.values(e).map(v => `"${v}"`).join(",") + "\n";
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "mood.csv";
  a.click();
}

function toggleEntries() {
  const div = document.getElementById("entries");
  const entries = JSON.parse(localStorage.getItem("entries")) || [];

  div.innerHTML = entries.slice().reverse().map(e =>
    `<p>${e.timestamp} – energy:${e.energy}, mood:${e.moody}</p>`
  ).join("");
}

function voice() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Voice not supported");
    return;
  }

  const rec = new webkitSpeechRecognition();
  rec.start();

  rec.onresult = e => {
    document.getElementById("input").value += e.results[0][0].transcript;
  };
}

render();
</script>

</body>
</html>
